<!DOCTYPE html>
<html>
<head>
  <title>Activity 7 - Date and Time</title>
</head>
<body>

  <h2>JavaScript Date &amp; Time</h2>
  <hr>

  <p>Click the button below to display the current date and time.</p>

  <br>

  <button onclick="showDateTime()">Display Current Date &amp; Time</button>

  <br><br>

  <p id="datetime"></p>

  <script>
    function showDateTime() {
      var now = new Date();
      document.getElementById("datetime").innerHTML = now;
    }
  </script>

  <br>
  <a href="../../index.html">Back to Portfolio</a>

</body>
</html>
