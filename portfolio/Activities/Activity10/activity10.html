<!DOCTYPE html>
<html>
<head>
  <title>Activity 10 - Arithmetic Operators</title>
</head>
<body>

  <h1>Activity 10 - Arithmetic Operators</h1>
  <hr>

  <p>Enter two numbers to see all arithmetic operations.</p>

  <br>

  <label>Number 1: </label>
  <input type="number" id="num1" value="0"><br><br>

  <label>Number 2: </label>
  <input type="number" id="num2" value="0"><br><br>

  <button onclick="calculate()">Calculate</button>
  <button onclick="clearAll()">Clear</button>

  <br><br>

  <p>Sum (+) &mdash; <span id="sum">&mdash;</span></p>
  <p>Difference (&minus;) &mdash; <span id="diff">&mdash;</span></p>
  <p>Product (&times;) &mdash; <span id="prod">&mdash;</span></p>
  <p>Quotient (&divide;) &mdash; <span id="quot">&mdash;</span></p>
  <p>Modulo (%) &mdash; <span id="mod">&mdash;</span></p>

  <script>
    function calculate() {
      var a = Number(document.getElementById("num1").value);
      var b = Number(document.getElementById("num2").value);

      document.getElementById("sum").innerHTML = a + b;
      document.getElementById("diff").innerHTML = a - b;
      document.getElementById("prod").innerHTML = a * b;
      document.getElementById("quot").innerHTML = b != 0 ? a / b : "Cannot divide by zero";
      document.getElementById("mod").innerHTML = b != 0 ? a % b : "Cannot divide by zero";
    }

    function clearAll() {
      document.getElementById("num1").value = 0;
      document.getElementById("num2").value = 0;
      document.getElementById("sum").innerHTML = "&mdash;";
      document.getElementById("diff").innerHTML = "&mdash;";
      document.getElementById("prod").innerHTML = "&mdash;";
      document.getElementById("quot").innerHTML = "&mdash;";
      document.getElementById("mod").innerHTML = "&mdash;";
    }
  </script>

  <br>
  <a href="../../index.html">Back to Portfolio</a>

</body>
</html>
