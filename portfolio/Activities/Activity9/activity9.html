<!DOCTYPE html>
<html>
<head>
  <title>Activity 9 - Input and Output</title>
</head>
<body>

  <h1>Activity 9 - JavaScript Input and Output</h1>
  <hr>

  <p>Click the button to enter your name. It will then be displayed on the page.</p>

  <br>

  <button onclick="askName()">Enter Your Name</button>

  <br><br>

  <p id="output"></p>

  <script>
    function askName() {
      var name = prompt("What is your name?");
      document.getElementById("output").innerHTML = "Hello, " + name + "!";
    }
  </script>

  <br>
  <a href="../../index.html">Back to Portfolio</a>

</body>
</html>
